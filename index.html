<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitalis RPG</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23142124'/%3E%3Cpath d='M16 14h10l6 30 6-30h10L38 52H26L16 14z' fill='%23f4c95d'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css?v=20260625-clean-hud">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  </head>
  <body>
    <section id="title-screen" aria-label="Vitalis title screen">
      <div class="title-panel">
        <p class="eyebrow">Vitalis RPG</p>
        <h1>Vitalis</h1>
        <p>Build a four-person party, survive the road, and bring the last light back through the ruins.</p>
        <div class="title-actions">
          <button id="continue-game" type="button">Continue</button>
          <button id="new-game-title" type="button">New Game</button>
        </div>
      </div>
    </section>

    <main id="shell">
      <section id="game-stage" aria-label="Vitalis RPG game canvas"></section>

      <aside id="hud" aria-label="Party status">
        <div class="hud-top">
          <div>
            <p class="eyebrow">Vitalis RPG</p>
            <h1 id="scene-title">Village</h1>
            <span id="mission-pill" class="mission-pill">Choose a path</span>
          </div>
          <div class="resource-row">
            <span id="gold-pill">Gold 0</span>
            <span id="potions-pill">Items 0</span>
            <span id="save-pill">Saved --</span>
            <button id="menu-toggle" type="button">Menu</button>
            <button id="new-game-top" type="button">New Game</button>
          </div>
        </div>

        <div id="party-list" class="party-list"></div>

        <div id="context-panel" class="context-panel">
          <div id="context-copy"></div>
          <div id="action-bar" class="action-bar"></div>
        </div>

        <div id="log-panel" class="log-panel" aria-live="polite"></div>
      </aside>

      <section id="victory-overlay" class="victory-overlay hidden" aria-label="Victory rewards" aria-live="polite">
        <div class="victory-card">
          <div id="victory-copy"></div>
          <div id="victory-actions" class="victory-actions"></div>
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js?v=20260625-clean-hud"></script>
  </body>
</html>
